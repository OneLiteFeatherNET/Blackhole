openapi: 3.0.1
info:
  title: Blackhole API
  description: Simple ban management system
  contact:
    name: Management
    url: https://onelitefeather.net
    email: admin@onelitefeather.net
  license:
    name: Close Source
  version: 0.0.2
paths:
  /auth/bootstrap:
    post:
      tags:
      - Auth
      summary: Bootstrap the first admin token
      description: Exchanges the deployment's bootstrap secret for a PLATFORM_ADMIN
        token.
      operationId: bootstrap
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BootstrapRequestDTO"
        required: true
      responses:
        "200":
          description: bootstrap 200 response
          content:
            application/json:
              schema:
                type: object
  /auth/token:
    post:
      tags:
      - Auth
      summary: Issue a tenant-scoped token
      description: Issues a token for a given tenant and role. Requires an authenticated
        PLATFORM_ADMIN or TENANT_ADMIN caller.
      operationId: issueToken
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueTokenRequestDTO"
        required: true
      responses:
        "200":
          description: issueToken 200 response
          content:
            application/json:
              schema:
                type: object
  /connector:
    get:
      tags:
      - Connector
      summary: Get all connectors
      operationId: getConnectors
      parameters:
      - name: pageable
        in: query
        required: true
        explode: false
        schema:
          $ref: "#/components/schemas/Pageable"
      responses:
        "200":
          description: getConnectors 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Page_ConnectorRegistrationDTO_"
    post:
      tags:
      - Connector
      summary: Register a connector
      operationId: registerConnector
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectorRegistrationRequestDTO"
        required: true
      responses:
        "200":
          description: registerConnector 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectorRegistrationCreatedDTO"
  /connector/oauth2/token:
    post:
      tags:
      - Connector
      summary: Exchange connector client credentials for a token
      description: OAuth2 client-credentials style exchange. Returns a token scoped
        to the connector's granted scopes.
      operationId: connectorToken
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectorTokenRequestDTO"
        required: true
      responses:
        "200":
          description: connectorToken 200 response
          content:
            application/json:
              schema:
                type: object
  /connector/subscription:
    post:
      tags:
      - Connector
      summary: Create an event subscription for a connector
      operationId: addEventSubscription
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventSubscriptionRequestDTO"
        required: true
      responses:
        "400":
          description: deliveryUrl failed SSRF validation (see message)
        "200":
          description: addEventSubscription 200 response
          content:
            application/json:
              schema:
                type: object
  /connector/subscription/{identifier}:
    delete:
      tags:
      - Connector
      summary: Delete an event subscription
      operationId: removeEventSubscription
      parameters:
      - name: identifier
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: removeEventSubscription 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventSubscriptionDTO"
  /connector/{connectorId}/subscription:
    get:
      tags:
      - Connector
      summary: Get all event subscriptions for a connector
      operationId: getEventSubscriptions
      parameters:
      - name: connectorId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: pageable
        in: query
        required: true
        explode: false
        schema:
          $ref: "#/components/schemas/Pageable"
      responses:
        "200":
          description: getEventSubscriptions 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Page_EventSubscriptionDTO_"
  /connector/{identifier}:
    get:
      tags:
      - Connector
      summary: Get a connector by ID
      operationId: getConnectorById
      parameters:
      - name: identifier
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: getConnectorById 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectorRegistrationDTO"
    delete:
      tags:
      - Connector
      summary: Delete a connector
      operationId: removeConnector
      parameters:
      - name: identifier
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: removeConnector 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectorRegistrationDTO"
  /connector/{identifier}/update:
    post:
      tags:
      - Connector
      summary: Update a connector's name/scopes/status
      operationId: updateConnector
      parameters:
      - name: identifier
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectorRegistrationDTO"
        required: true
      responses:
        "200":
          description: updateConnector 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectorRegistrationDTO"
  /profile:
    get:
      tags:
      - PunishProfile
      summary: Get all punishment profiles.
      description: Get all existing punishment profiles
      operationId: getProfiles
      parameters:
      - name: pageable
        in: query
        required: true
        explode: false
        schema:
          $ref: "#/components/schemas/Pageable"
      responses:
        "200":
          description: The updated profile
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PunishProfileResponse"
    post:
      tags:
      - PunishProfile
      summary: Add a new punishment profile.
      description: Add a new profile for punishments
      operationId: addProfile
      requestBody:
        description: the profile to add
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PunishProfileDTO"
        required: true
      responses:
        "200":
          description: The profile which was added to the service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PunishProfileResponse"
  /profile/delete/{tenantId}/{owner}:
    delete:
      tags:
      - PunishProfile
      summary: Delete a punishment profile by the owner.
      description: Delete a punish profile via uuid
      operationId: removeProfile
      parameters:
      - name: tenantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: owner
        in: path
        description: the owner of the profile
        required: true
        schema:
          pattern: "^[a-fA-F0-9]{128}$"
          type: string
          x-pattern-message: Owner must be a sha-512 hash
      responses:
        "200":
          description: The deleted profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PunishProfileResponse"
        "400":
          description: Error message when there is no profile linked to the given
            id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /profile/update/{tenantId}/{owner}:
    post:
      tags:
      - PunishProfile
      summary: Get a punishment profile by the owner.
      description: Update a punishment profile
      operationId: updateProfile
      parameters:
      - name: tenantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: owner
        in: path
        required: true
        schema:
          pattern: "^[a-fA-F0-9]{128}$"
          type: string
          x-pattern-message: Owner must be a sha-512 hash
      requestBody:
        description: the profile to get
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PunishProfileDTO"
        required: true
      responses:
        "200":
          description: The updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PunishProfileResponse"
        "400":
          description: Error message when there is no profile linked to the given
            id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /profile/{tenantId}/{owner}:
    get:
      tags:
      - PunishProfile
      summary: Get a punishment profile by the owner.
      description: Get a profile by id
      operationId: getById
      parameters:
      - name: tenantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: owner
        in: path
        required: true
        schema:
          pattern: "^[a-fA-F0-9]{128}$"
          type: string
          x-pattern-message: Owner must be a sha-512 hash
      responses:
        "200":
          description: The profile which matches with the given id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PunishProfileDTO"
        "404":
          description: Error message when there is no profile linked to the given
            id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /punishment:
    get:
      tags:
      - Punishment
      summary: Get all punishments
      description: Retrieves a paginated list of all punishment entries in the system
      operationId: getPunishments
      parameters:
      - name: pageable
        in: query
        required: true
        explode: false
        schema:
          $ref: "#/components/schemas/Pageable"
      responses:
        "200":
          description: Successfully retrieved punishment entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PunishEntryDTO"
  /punishment/active/{tenantId}/{owner}/{templateId}/{source}:
    post:
      tags:
      - Punishment
      summary: Add active punishment
      description: Creates and applies an active punishment to a player profile based
        on a punishment template
      operationId: addActivePunishment
      parameters:
      - name: tenantId
        in: path
        description: the tenant the punishment belongs to
        required: true
        schema:
          type: string
          format: uuid
      - name: owner
        in: path
        description: the owner of the punishment
        required: true
        schema:
          pattern: "^[a-fA-F0-9]{128}$"
          type: string
          x-pattern-message: Owner must be a sha-512 hash
      - name: templateId
        in: path
        description: the template id of the punishment
        required: true
        schema:
          type: string
          format: uuid
      - name: source
        in: path
        description: the source of the punishment
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: Punishment successfully applied to profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PunishProfileResponse"
        "404":
          description: Profile or template not found
        "400":
          description: Invalid input parameters (owner must be SHA-512 hash)
  /report:
    get:
      tags:
      - Report
      summary: Get all reports
      description: Retrieves a paginated list of reports for the caller's tenant
      operationId: getReports
      parameters:
      - name: pageable
        in: query
        required: true
        explode: false
        schema:
          $ref: "#/components/schemas/Pageable"
      responses:
        "200":
          description: Successfully retrieved reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReportDTO"
    post:
      tags:
      - Report
      summary: Submit a report
      description: Submits a player report. Rate-limited per reporterHash within a
        configurable time window.
      operationId: submitReport
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportDTO"
        required: true
      responses:
        "200":
          description: Report successfully submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportDTO"
        "429":
          description: Rate limit exceeded for this reporter
  /report/{tenantId}/{identifier}/resolve:
    post:
      tags:
      - Report
      summary: Resolve a report
      description: "Resolves a report, optionally applying a punishment template to\
        \ the reported player"
      operationId: resolveReport
      parameters:
      - name: tenantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: identifier
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportResolutionDTO"
        required: true
      responses:
        "200":
          description: Report successfully resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportDTO"
        "404":
          description: Report or punishment template not found
        "400":
          description: punishmentSource is required when punishmentTemplateId is set
  /signal:
    post:
      tags:
      - Signal
      summary: Submit an external signal
      operationId: submitSignal
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignalDTO"
        required: true
      responses:
        "200":
          description: submitSignal 200 response
          content:
            application/json:
              schema:
                type: object
  /template:
    get:
      tags:
      - Punishment Templates
      summary: Get all punishment templates
      description: Retrieves a paginated list of all punishment templates in the system
      operationId: getAllTemplates
      parameters:
      - name: pageable
        in: query
        required: true
        explode: false
        schema:
          $ref: "#/components/schemas/Pageable"
      responses:
        "200":
          description: Successfully retrieved punishment templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PunishTemplateDTO"
    post:
      tags:
      - Punishment Templates
      summary: Create punishment template
      description: Creates a new punishment template.
      operationId: addTemplate
      requestBody:
        description: the template to add
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PunishTemplateDTO"
        required: true
      responses:
        "200":
          description: Template successfully created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PunishTemplateDTO"
        "405":
          description: Method not allowed - identifier must be null for creation
        "400":
          description: Invalid template data
  /template/delete/{identifier}:
    delete:
      tags:
      - Punishment Templates
      summary: Delete punishment template
      description: Deletes a punishment template by its identifier
      operationId: deleteTemplate
      parameters:
      - name: identifier
        in: path
        description: the identifier of the template to remove
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: Template successfully deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PunishTemplateDTO"
        "404":
          description: Template not found
  /template/update:
    post:
      tags:
      - Punishment Templates
      summary: Update punishment template
      description: Updates an existing punishment template.
      operationId: updateTemplate
      requestBody:
        description: the template to update
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PunishTemplateDTO"
        required: true
      responses:
        "200":
          description: Template successfully updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PunishTemplateDTO"
        "404":
          description: Template not found
        "400":
          description: Invalid template data
  /template/{identifier}:
    get:
      tags:
      - Punishment Templates
      summary: Get punishment template by ID
      description: Retrieves a specific punishment template by its identifier
      operationId: getTemplateById
      parameters:
      - name: identifier
        in: path
        description: the identifier of the template to retrieve
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: Template successfully retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PunishTemplateDTO"
        "404":
          description: Template not found
  /tenant:
    get:
      tags:
      - Tenants
      summary: Get all tenants
      description: Retrieves a paginated list of all tenants in the system
      operationId: getTenants
      parameters:
      - name: pageable
        in: query
        required: true
        explode: false
        schema:
          $ref: "#/components/schemas/Pageable"
      responses:
        "200":
          description: Successfully retrieved tenants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TenantDTO"
    post:
      tags:
      - Tenants
      summary: Create tenant
      description: Creates a new tenant.
      operationId: addTenant
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantDTO"
        required: true
      responses:
        "200":
          description: Tenant successfully created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantDTO"
        "405":
          description: Method not allowed - identifier must be null for creation
        "409":
          description: A tenant with this slug already exists
  /tenant/delete/{identifier}:
    delete:
      tags:
      - Tenants
      summary: Delete tenant
      description: Deletes a tenant by its identifier
      operationId: deleteTenant
      parameters:
      - name: identifier
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: Tenant successfully deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantDTO"
        "404":
          description: Tenant not found
  /tenant/update:
    post:
      tags:
      - Tenants
      summary: Update tenant
      description: Updates an existing tenant.
      operationId: updateTenant
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantDTO"
        required: true
      responses:
        "200":
          description: Tenant successfully updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantDTO"
        "404":
          description: Tenant not found
  /tenant/{identifier}:
    get:
      tags:
      - Tenants
      summary: Get tenant by ID
      description: Retrieves a specific tenant by its identifier
      operationId: getTenantById
      parameters:
      - name: identifier
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: Tenant successfully retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantDTO"
        "404":
          description: Tenant not found
components:
  schemas:
    BootstrapRequestDTO:
      required:
      - secret
      type: object
      properties:
        secret:
          minLength: 1
          type: string
    ConnectorRegistrationCreatedDTO:
      required:
      - connector
      - oauth2ClientSecret
      type: object
      properties:
        connector:
          $ref: "#/components/schemas/ConnectorRegistrationDTO"
        oauth2ClientSecret:
          type: string
      description: Response to a connector registration. `oauth2ClientSecret` is the
        only time the plaintext secret is ever shown - only the SHA-512 hash is persisted.
    ConnectorRegistrationDTO:
      required:
      - identifier
      - metaData
      - name
      - oauth2ClientId
      - scopes
      - status
      - tenantId
      type: object
      properties:
        tenantId:
          type: string
          format: uuid
        identifier:
          type: string
          format: uuid
        name:
          type: string
        oauth2ClientId:
          type: string
        scopes:
          type: array
          items:
            type: string
        status:
          $ref: "#/components/schemas/ConnectorStatus"
        metaData:
          type: object
          additionalProperties:
            type: object
      description: "Representation of a registered connector. Deliberately never carries\
        \ the client secret (or its hash) - that's only ever shown once, at creation\
        \ time, via ConnectorRegistrationCreatedDTO."
    ConnectorRegistrationRequestDTO:
      required:
      - name
      - scopes
      - tenantId
      type: object
      properties:
        tenantId:
          type: string
          format: uuid
        name:
          minLength: 1
          type: string
        scopes:
          minItems: 1
          type: array
          items:
            type: string
    ConnectorStatus:
      type: string
      description: Whether a registered connector may currently authenticate/receive
        webhook deliveries.
      enum:
      - ACTIVE
      - SUSPENDED
    ConnectorTokenRequestDTO:
      required:
      - clientId
      - clientSecret
      type: object
      properties:
        clientId:
          minLength: 1
          type: string
        clientSecret:
          minLength: 1
          type: string
      description: OAuth2 client-credentials style exchange for a connector-scoped
        token.
    ErrorResponse:
      type: object
      properties:
        The error message:
          type: string
          description: the error message
      description: The error response when something went wrong on profile requests
    EventSubscriptionDTO:
      required:
      - active
      - connectorId
      - deliveryUrl
      - eventTypes
      - failureCount
      - identifier
      - metaData
      type: object
      properties:
        identifier:
          type: string
          format: uuid
        connectorId:
          type: string
          format: uuid
        eventTypes:
          type: array
          items:
            type: string
        deliveryUrl:
          type: string
        active:
          type: boolean
        failureCount:
          type: integer
          format: int32
        lastAttemptAt:
          type: integer
          format: int64
          nullable: true
        lastSuccessAt:
          type: integer
          format: int64
          nullable: true
        metaData:
          type: object
          additionalProperties:
            type: object
      description: "Representation of a connector's event subscription. Never carries\
        \ the signing secret - that's only shown once, at creation time, via EventSubscriptionCreatedDTO."
    EventSubscriptionRequestDTO:
      required:
      - connectorId
      - deliveryUrl
      - eventTypes
      type: object
      properties:
        connectorId:
          type: string
          format: uuid
        eventTypes:
          minItems: 1
          type: array
          items:
            type: string
        deliveryUrl:
          minLength: 1
          type: string
    IssueTokenRequestDTO:
      required:
      - role
      - tenantId
      type: object
      properties:
        tenantId:
          type: string
          format: uuid
        role:
          minLength: 1
          type: string
    Page_ConnectorRegistrationDTO_:
      type: object
      allOf:
      - $ref: "#/components/schemas/Slice_ConnectorRegistrationDTO_"
      - type: object
        properties:
          totalSize:
            type: integer
            format: int64
          totalPages:
            type: integer
            format: int32
    Page_EventSubscriptionDTO_:
      type: object
      allOf:
      - $ref: "#/components/schemas/Slice_EventSubscriptionDTO_"
      - type: object
        properties:
          totalSize:
            type: integer
            format: int64
          totalPages:
            type: integer
            format: int32
    Pageable:
      required:
      - size
      - sort
      type: object
      allOf:
      - $ref: "#/components/schemas/Sort"
      - type: object
        properties:
          number:
            type: integer
            format: int32
          size:
            type: integer
            format: int32
          mode:
            $ref: "#/components/schemas/Pageable.Mode"
          sort:
            $ref: "#/components/schemas/Sort"
    Pageable.Mode:
      type: string
      enum:
      - CURSOR_NEXT
      - CURSOR_PREVIOUS
      - OFFSET
    PunishEntryDTO:
      required:
      - identifier
      - metaData
      - scope
      - source
      - template
      - tenantId
      - type
      type: object
      properties:
        identifier:
          type: string
          description: the identifier of the punishment
        tenantId:
          type: string
          description: the tenant the punishment belongs to
          format: uuid
        source:
          type: string
          description: the source of the punishment
          format: uuid
        type:
          $ref: "#/components/schemas/PunishType"
        scope:
          type: string
          description: "the optional scope (e.g. event/community) this punishment\
            \ is restricted to, or `null` for network-wide"
        template:
          $ref: "#/components/schemas/PunishTemplateDTO"
        metaData:
          type: object
          additionalProperties:
            type: object
          description: the metadata of the punishment
      description: Represents a punish entry which can be used to store the punishment
        in the database.
    PunishProfileDTO:
      required:
      - metaData
      - owner
      - tenantId
      type: object
      properties:
        activeChatBan:
          nullable: true
          allOf:
          - $ref: "#/components/schemas/PunishEntryDTO"
        activeBan:
          nullable: true
          allOf:
          - $ref: "#/components/schemas/PunishEntryDTO"
        tenantId:
          type: string
          format: uuid
        owner:
          pattern: "^[a-fA-F0-9]{128}$"
          type: string
          x-pattern-message: Owner must be a sha-512 hash
        history:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/PunishEntryDTO"
        metaData:
          type: object
          additionalProperties:
            type: object
    PunishProfileResponse:
      type: object
    PunishTemplateDTO:
      required:
      - metaData
      - reason
      - tenantId
      - type
      type: object
      properties:
        tenantId:
          type: string
          format: uuid
        metaData:
          type: object
          additionalProperties:
            type: object
        reason:
          minLength: 1
          type: string
        type:
          $ref: "#/components/schemas/PunishType"
        identifier:
          type: string
          format: uuid
          nullable: true
    PunishType:
      type: string
      description: |-
        This enumeration defines each type of ban which is supported by the application.


        The following types are supported:

        * Server: means that a target is banned from a specific server
        * Network: means that a target is banned from the whole network
        * Chat: means that a target is banned from the chat
      enum:
      - SERVER
      - NETWORK
      - CHAT
    ReportCategory:
      type: string
      description: What kind of behavior a report is about.
      enum:
      - CHAT_ABUSE
      - CHEATING
      - GRIEFING
      - OTHER
    ReportDTO:
      required:
      - category
      - createdAt
      - metaData
      - reportedHash
      - reporterHash
      - tenantId
      - updatedAt
      type: object
      properties:
        tenantId:
          type: string
          description: the tenant this report belongs to
          format: uuid
        identifier:
          type: string
          description: "the identifier of the report, `null` when submitting"
          format: uuid
          nullable: true
        reporterHash:
          minLength: 1
          pattern: "^[a-fA-F0-9]{128}$"
          type: string
          description: SHA-512 hash of the reporting player
          x-pattern-message: reporterHash must be a sha-512 hash
        reportedHash:
          minLength: 1
          pattern: "^[a-fA-F0-9]{128}$"
          type: string
          description: SHA-512 hash of the reported player
          x-pattern-message: reportedHash must be a sha-512 hash
        category:
          $ref: "#/components/schemas/ReportCategory"
        description:
          maxLength: 1000
          type: string
          description: a bounded free-text description
          nullable: true
        evidenceReferences:
          type: array
          description: optional references to `PunishmentEvidenceEntity` entries
          nullable: true
          items:
            type: string
            format: uuid
        status:
          nullable: true
          allOf:
          - $ref: "#/components/schemas/ReportStatus"
        createdAt:
          type: integer
          description: epoch millis when the report was submitted
          format: int64
        updatedAt:
          type: integer
          description: epoch millis of the last status change
          format: int64
        resolvedBy:
          type: string
          description: "the staff/system identity that resolved this report, if resolved"
          format: uuid
          nullable: true
        resolutionNote:
          maxLength: 1000
          type: string
          description: "a note explaining the resolution, if resolved"
          nullable: true
        metaData:
          type: object
          additionalProperties:
            type: object
          description: extensible metadata
      description: "A player report. `status`/`createdAt`/`updatedAt`/`resolvedBy`/\
        \ `resolutionNote` are server-controlled - a submission simply leaves them\
        \ unset/default, the same nullable-identifier-means-create convention used\
        \ by TenantDTO."
    ReportResolutionDTO:
      required:
      - resolvedBy
      - status
      type: object
      properties:
        status:
          $ref: "#/components/schemas/ReportStatus"
        resolutionNote:
          maxLength: 1000
          type: string
          description: an optional note explaining the decision
          nullable: true
        resolvedBy:
          type: string
          description: the staff/system identity resolving this report
          format: uuid
        punishmentTemplateId:
          type: string
          description: an optional template to apply to the reported player
          format: uuid
          nullable: true
        punishmentSource:
          type: string
          description: the staff/system identity applying the punishment; required
            if `punishmentTemplateId` is set
          format: uuid
          nullable: true
      description: Request body for resolving a report. Providing `punishmentTemplateId`
        (together with `punishmentSource`) applies that template to the reported player
        as part of the same resolution - the report system's actual integration point
        with punishments.
    ReportStatus:
      type: string
      description: The lifecycle state of a report.
      enum:
      - OPEN
      - UNDER_REVIEW
      - ACTIONED
      - DISMISSED
    SignalDTO:
      required:
      - metaData
      - owner
      - payload
      - signalType
      - tenantId
      type: object
      properties:
        tenantId:
          type: string
          description: the tenant this signal belongs to
          format: uuid
        owner:
          minLength: 1
          pattern: "^[a-fA-F0-9]{128}$"
          type: string
          description: SHA-512 hash of the affected player
          x-pattern-message: owner must be a sha-512 hash
        signalType:
          minLength: 1
          type: string
          description: "a connector-chosen identifier, e.g. `anticheat.flag`"
        payload:
          type: object
          additionalProperties:
            type: object
          description: signal-specific data
        metaData:
          type: object
          additionalProperties:
            type: object
          description: extensible metadata
      description: A generic external signal (e.g. an anticheat flag) ingested via
        `POST /signal`. Deliberately opaque - Blackhole doesn't know or care what
        `signalType` values a given connector uses; it's published as a domain event
        and Phase 5's ELO system (or any other consumer) decides what to do with it.
        This is what keeps the connector framework generic rather than anticheat-specific.
    Slice_ConnectorRegistrationDTO_:
      required:
      - content
      - pageable
      type: object
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/ConnectorRegistrationDTO"
        pageable:
          $ref: "#/components/schemas/Pageable"
        pageNumber:
          type: integer
          format: int32
        offset:
          type: integer
          format: int64
        size:
          type: integer
          format: int32
        empty:
          type: boolean
        numberOfElements:
          type: integer
          format: int32
    Slice_EventSubscriptionDTO_:
      required:
      - content
      - pageable
      type: object
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/EventSubscriptionDTO"
        pageable:
          $ref: "#/components/schemas/Pageable"
        pageNumber:
          type: integer
          format: int32
        offset:
          type: integer
          format: int64
        size:
          type: integer
          format: int32
        empty:
          type: boolean
        numberOfElements:
          type: integer
          format: int32
    Sort:
      required:
      - orderBy
      type: object
      properties:
        orderBy:
          type: array
          items:
            $ref: "#/components/schemas/Sort.Order"
    Sort.Order:
      required:
      - direction
      - ignoreCase
      - property
      type: object
      properties:
        ignoreCase:
          type: boolean
        direction:
          $ref: "#/components/schemas/Sort.Order.Direction"
        property:
          type: string
        ascending:
          type: boolean
    Sort.Order.Direction:
      type: string
      enum:
      - ASC
      - DESC
    TenantDTO:
      required:
      - metaData
      - name
      - slug
      - status
      type: object
      properties:
        identifier:
          type: string
          format: uuid
          nullable: true
        name:
          minLength: 1
          type: string
        slug:
          minLength: 1
          type: string
        status:
          $ref: "#/components/schemas/TenantStatus"
        metaData:
          type: object
          additionalProperties:
            type: object
    TenantStatus:
      type: string
      enum:
      - ACTIVE
      - SUSPENDED
