# RabbitMQ backs the domain event bus (topic exchange blackhole.events) and cross-replica
# cache invalidation (fanout exchange blackhole.cache.invalidate) - see
# net.onelitefeather.blackhole.backend.events. Both exchanges are declared at channel-creation
# time by BlackholeRabbitTopology, not via config, since this version of micronaut-rabbitmq has
# no declarative exchange-config support.
rabbitmq:
  host: ${RABBITMQ_HOST:localhost}
  port: ${RABBITMQ_PORT:5672}
  username: ${RABBITMQ_USER:guest}
  password: ${RABBITMQ_PASSWORD:guest}

# Redis mirrors active-punishment state for Velocity proxies (net.onelitefeather.blackhole.backend.redis)
# - RedisSyncConsumer is the sole writer, bridging the domain event bus (punishment.created/
# expired/revoked, appeal.resolved) onto Redis keys + a pub/sub channel so every proxy in a
# multi-proxy network sees the same state without hitting this API on every login/chat message.
redis:
  uri: ${REDIS_URI:`redis://localhost:6379`}

# Datasource
datasources:
  default:
    url: ${JDBC_URL:`jdbc:mariadb://127.0.0.1:3336/blackhole`}
    password: ${JDBC_PASSWORD:`blackhole`}
    username: ${JDBC_USER:`root`}
    driver-class-name: ${JDBC_DRIVER:`org.mariadb.jdbc.Driver`}
# JPA
jpa:
  default:
    properties:
      hibernate:
        hbm2ddl:
          auto: none
        show_sql: false

# Liquibase is now the sole owner of the schema. hbm2ddl.auto is "none" rather than "validate"
# because Hibernate's schema validator disagrees with its own DDL generator about the expected
# column type for @JdbcTypeCode(SqlTypes.JSON) columns on MariaDB (MariaDB's JSON type is a
# LONGTEXT + CHECK(json_valid(...)) alias; validate expects Types#JSON, create emits
# Types#LONGVARCHAR) - a known Hibernate/MariaDB dialect mismatch, not specific to this schema.
liquibase:
  datasources:
    default:
      enabled: true
      change-log: classpath:db/changelog/db.changelog-master.xml

# Metrics scraping is expected to be protected at the network level, like every other endpoint
# (see the no-auth note below) - a scrape target shouldn't need a bearer token either way.
endpoints:
  prometheus:
    sensitive: false

# There is deliberately no auth system (no JWT, no @Secured) right now: every endpoint is open.
# The trust model is that only trusted callers can reach this API at all - admins/tools calling
# the REST API directly, or the Velocity plugin acting on behalf of admins/moderators - and that
# boundary is enforced at the network/deployment level (firewalling, private networking), not by
# the application. Revisit once real per-actor identity exists (see the historical "no per-actor
# identity" gap noted for source/resolvedBy/reviewerId fields).
blackhole:
  # Report submission is rate-limited per reporterHash within this rolling window, so reporting
  # itself can't become a griefing vector. reporterHash is client-supplied (no per-player identity
  # exists yet), so max-reports-network-wide is an additional aggregate backstop that still caps
  # abuse even if a caller varies reporterHash on every request.
  report:
    rate-limit:
      max-reports: ${BLACKHOLE_REPORT_RATE_LIMIT_MAX:5}
      max-reports-network-wide: ${BLACKHOLE_REPORT_RATE_LIMIT_MAX_NETWORK_WIDE:50}
      window: ${BLACKHOLE_REPORT_RATE_LIMIT_WINDOW:PT10M}
  # WebhookDispatchConsumer fans out domain events to connector webhooks (Phase 4). A failed
  # delivery is dead-lettered to a retry queue for retry-delay-ms, then dead-letters back to the
  # dispatch queue - a native RabbitMQ TTL+DLX loop, not an in-process retry. After max-retries
  # attempts a dispatch is parked in blackhole.webhook.failed instead of retried forever.
  webhook:
    retry-delay-ms: ${BLACKHOLE_WEBHOOK_RETRY_DELAY_MS:30000}
    max-retries: ${BLACKHOLE_WEBHOOK_MAX_RETRIES:5}
    # SSRF hardening: an ADMIN sets deliveryUrl, a genuinely less-trusted party than the platform
    # operator. Keep this false in any real deployment - only for local dev/testing against a
    # loopback receiver.
    allow-private-networks: ${BLACKHOLE_WEBHOOK_ALLOW_PRIVATE_NETWORKS:false}
  # Dual-ELO system (Phase 5): baseline is the network-wide starting/neutral score for both
  # tracks, and perma-ban-threshold the network-wide permanent-ban trigger. Crossing below
  # soft-threshold triggers an automatic temporary punishment; below perma-ban-threshold, a
  # permanent ban via the perma-ban-template configured below (skipped, not auto-generated, if
  # none is configured). decay.interval-ms controls the "day" length pending decay is measured
  # in - shortened via env var for testing, 1 real day (86400000ms) in production.
  elo:
    baseline: ${BLACKHOLE_ELO_BASELINE:1000}
    soft-threshold: ${BLACKHOLE_ELO_SOFT_THRESHOLD:700}
    perma-ban-threshold: ${BLACKHOLE_ELO_PERMA_BAN_THRESHOLD:300}
    # Perma-ban template per track, applied when a player's score crosses below
    # perma-ban-threshold. Left unset by default - enforcement is skipped (logged) until a real
    # template UUID is configured for each track, rather than auto-generating one for the most
    # severe consequence.
    perma-ban-template:
      chat-id: ${BLACKHOLE_ELO_PERMA_BAN_TEMPLATE_CHAT_ID:}
      gameplay-id: ${BLACKHOLE_ELO_PERMA_BAN_TEMPLATE_GAMEPLAY_ID:}
    decay:
      recovery-per-day: ${BLACKHOLE_ELO_DECAY_RECOVERY_PER_DAY:10}
      interval-ms: ${BLACKHOLE_ELO_DECAY_INTERVAL_MS:86400000}
      sweep-cron: ${BLACKHOLE_ELO_DECAY_SWEEP_CRON:`0 0 3 * * *`}
    auto-ban:
      chat-soft-duration: ${BLACKHOLE_ELO_CHAT_SOFT_DURATION:PT24H}
      gameplay-soft-duration: ${BLACKHOLE_ELO_GAMEPLAY_SOFT_DURATION:P3D}
    # Rule-based ToxicityScorer default: an obviously-placeholder keyword list, not a real
    # moderation wordlist - swap the ToxicityScorer bean entirely for production use (an ML
    # classifier is an explicit later replacement per the roadmap, not part of this phase).
    chat:
      toxic-patterns: ${BLACKHOLE_ELO_CHAT_TOXIC_PATTERNS:stupid,idiot,shut up,hate you}
      severity-per-match: ${BLACKHOLE_ELO_CHAT_SEVERITY_PER_MATCH:0.4}
      flag-threshold: ${BLACKHOLE_ELO_CHAT_FLAG_THRESHOLD:0.3}
      flag-delta: ${BLACKHOLE_ELO_CHAT_FLAG_DELTA:-50}
      evidence-retention-days: ${BLACKHOLE_ELO_CHAT_EVIDENCE_RETENTION_DAYS:60}
    signal:
      default-delta: ${BLACKHOLE_ELO_SIGNAL_DEFAULT_DELTA:-150}
    report:
      actioned-delta: ${BLACKHOLE_ELO_REPORT_ACTIONED_DELTA:-100}
      # Awarded to the reporter when their report is resolved ACTIONED with an actual
      # punishment applied to the reported player.
      reward-delta: ${BLACKHOLE_ELO_REPORT_REWARD_DELTA:50}
  # Appeal workflow (Phase 6): min-days-auto is deliberately shorter than min-days-manual - the
  # whole point of ELO auto-bans is saving moderator time, so reversing one shouldn't cost MORE
  # of it via a longer wait. repeat-appeal-cooldown-days blocks a new appeal on the same
  # punishment shortly after a prior one was denied/ineligible.
  appeal:
    min-days-manual: ${BLACKHOLE_APPEAL_MIN_DAYS_MANUAL:14}
    min-days-auto: ${BLACKHOLE_APPEAL_MIN_DAYS_AUTO:3}
    repeat-appeal-cooldown-days: ${BLACKHOLE_APPEAL_REPEAT_COOLDOWN_DAYS:7}
  # Ban-evasion detection (Phase 7): ip-salt gates the whole feature - POST /evasion/record
  # returns 503 rather than silently computing a weak unsalted-equivalent hash if it's unset.
  # See IpCorrelationService's javadoc for the salt rotation tradeoff before ever rotating this.
  evasion:
    ip-salt: ${BLACKHOLE_EVASION_IP_SALT:}
    detection-window-days: ${BLACKHOLE_EVASION_DETECTION_WINDOW_DAYS:7}
    retention-days: ${BLACKHOLE_EVASION_RETENTION_DAYS:90}
    retention-sweep-cron: ${BLACKHOLE_EVASION_RETENTION_SWEEP_CRON:`0 30 3 * * *`}

micronaut:
  application:
    name: Blackhole API
  serde:
    jackson:
      parser-features:

  # Server
  server:
    port: ${PORT:8080}

# OpenAPI
  router:
    static-resources:
      swagger:
        paths: classpath:META-INF/swagger
        mapping: /swagger/**
      swagger-ui:
        paths: classpath:META-INF/swagger/views/swagger-ui
        mapping: /swagger-ui/**

# OpenTelemetry — tracing is disabled unless OTEL_TRACES_EXPORTER=otlp is set
# (do this in the Docker/prod container). Metrics stay on Prometheus/Micrometer.
otel:
  service:
    name: ${OTEL_SERVICE_NAME:blackhole}
  traces:
    exporter: ${OTEL_TRACES_EXPORTER:none}
  metrics:
    exporter: none
  logs:
    exporter: none
  exporter:
    otlp:
      protocol: grpc
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:`http://localhost:4317`}
  exclusions:
    - /health
    - /health/.*
    - /prometheus
    - /swagger
    - /swagger/.*
    - /swagger-ui/.*
